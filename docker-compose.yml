version: '3.9'

services:
  coagent-db:
    image: postgres:15-alpine
    container_name: coagent4u-db
    environment:
      POSTGRES_DB: coagent4u
      POSTGRES_USER: coagent4u
      POSTGRES_PASSWORD: coagent4u_dev
    ports:
      - "5432:5432"
    volumes:
      - coagent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coagent4u"]
      interval: 10s
      timeout: 5s
      retries: 5

  coagent-python:
    build:
      context: ./agent-py
      dockerfile: Dockerfile
    container_name: coagent4u-python
    ports:
      - "8000:8000"
    depends_on:
      - coagent-redis
    environment:
      - JAVA_API_URL=http://coagent-java:8080/api/internal
      - REDIS_URL=redis://coagent-redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}

  coagent-redis:
    image: redis:7-alpine
    container_name: coagent4u-redis
    ports:
      - "6379:6379"

volumes:
  coagent_pgdata:
