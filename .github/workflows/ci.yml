name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Java Backend ───────────────────────────────────────────
  java-build:
    name: Java Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: coagent4u_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & verify
        run: mvn clean verify -B -q
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/coagent4u_test
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
          AES_ENCRYPTION_KEY: dGVzdC1hZXMtMjU2LWtleS1mb3ItY2ktcGlwZWxpbmU=
          SLACK_SIGNING_SECRET: ci-placeholder
          SLACK_BOT_TOKEN: xoxb-ci-placeholder
          SLACK_APP_ID: ci-placeholder
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          GROQ_API_KEY: ci-placeholder

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: '**/target/surefire-reports/'

  # ── Python Agent ───────────────────────────────────────────
  python-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: agent-py/requirements.txt

      - name: Install dependencies
        working-directory: agent-py
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        working-directory: agent-py
        run: ruff check . --select E,W,F --ignore E501

      - name: Run tests
        working-directory: agent-py
        run: pytest tests/ -v --tb=short
        env:
          JAVA_API_URL: http://localhost:8080/api/internal
          REDIS_URL: redis://localhost:6379
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          GROQ_API_KEY: ci-placeholder

  # ── Frontend ───────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  # ── Docker ─────────────────────────────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [java-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t coagent4u:ci .

  # ── Security ───────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
