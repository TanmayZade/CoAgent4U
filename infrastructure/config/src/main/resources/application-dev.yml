# ============================================================
# CoAgent4U — Development Profile
# ============================================================
# Secrets come from .env file or IDE run configuration.
# NEVER commit secrets to VCS.

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  flyway:
    clean-disabled: false

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.coagent4u: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
