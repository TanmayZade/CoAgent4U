# ============================================================
# CoAgent4U — Application Configuration
# ============================================================
# All secrets MUST come from environment variables. No fallback defaults.
# Application will fail to boot if required env vars are missing.

server:
  port: 8080

spring:
  application:
    name: coagent4u
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      leak-detection-threshold: 30000
      validation-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── CoAgent4U custom configuration ──────────────────────────
# All secrets from env vars — no placeholder fallbacks
coagent:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  slack:
    signing-secret: ${SLACK_SIGNING_SECRET}
    bot-token: ${SLACK_BOT_TOKEN}
    app-id: ${SLACK_APP_ID}
    client-id: ${SLACK_CLIENT_ID}
    client-secret: ${SLACK_CLIENT_SECRET}
    redirect-uri: ${SLACK_REDIRECT_URI:http://localhost:8080/auth/slack/callback}

  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/integrations/google/callback}

  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiry-minutes: 1440    # 24 hours
    token-encryption-key: ${AES_ENCRYPTION_KEY}

  coordination:
    approval-timeout-minutes: 720
    max-availability-window-days: 14

  llm:
    enabled: ${LLM_ENABLED:false}
    groq-api-key: ${GROQ_API_KEY:gsk_dev_placeholder_key}
    model: llama-3.1-8b-instant
    timeout-ms: 5000

  rate-limiting:
    requests-per-minute: 100
