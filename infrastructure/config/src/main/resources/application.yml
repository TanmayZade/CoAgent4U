# ============================================================
# CoAgent4U — Application Configuration
# ============================================================
# This file contains shared defaults. Profile-specific overrides
# are in application-dev.yml / application-prod.yml.

server:
  port: 8080

spring:
  application:
    name: coagent4u
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-crimson-credit-airhrjj7-pooler.c-4.us-east-1.aws.neon.tech/CoAgent4U?sslmode=require&channel_binding=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_1NhOTH5poMEk}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      leak-detection-threshold: 30000
      validation-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── CoAgent4U custom configuration ──────────────────────────
coagent:
  slack:
    signing-secret: ${SLACK_SIGNING_SECRET:placeholder}
    bot-token: ${SLACK_BOT_TOKEN:placeholder}
    app-id: ${SLACK_APP_ID:placeholder}

  google:
    client-id: ${GOOGLE_CLIENT_ID:placeholder}
    client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/oauth2/callback}

  security:
    jwt-secret: ${JWT_SECRET:dev-jwt-secret-change-in-production-min-32-chars}
    jwt-expiry-minutes: 60
    token-encryption-key: ${AES_ENCRYPTION_KEY:placeholder}

  coordination:
    approval-timeout-minutes: 720
    max-availability-window-days: 14

  llm:
    enabled: ${LLM_ENABLED:true}
    groq-api-key: ${GROQ_API_KEY:placeholder}
    model: llama3-8b-8192
    timeout-ms: 5000

  rate-limiting:
    requests-per-minute: 100
